<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HiveZone – Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fcf6de;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .icon {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 16px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
            text-align: center;
        }

        p {
            font-size: 0.95rem;
            color: #666;
            text-align: center;
            line-height: 1.6;
            max-width: 280px;
            margin-bottom: 2.5rem;
        }

        button {
            background: #ffc107;
            color: #1a1a1a;
            border: none;
            border-radius: 2rem;
            padding: 1rem 2.5rem;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255,193,7,0.3);
            transition: transform 0.1s, opacity 0.1s;
        }

        button:active { transform: scale(0.97); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="icon"><img src="appIcon.png" alt="HiveZone" style="width:100%;height:100%;object-fit:contain;border-radius:50%" /></div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again to get back to the hive.</p>
    <button onclick="window.location.reload()">Try again</button>
</body>
</html>
